<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            font-family: Arial, sans-serif;

            background: linear-gradient(
                100deg,
                rgb(255, 145, 0),
                rgb(222, 30, 196),
                rgb(209, 205, 201),
                rgb(85, 5, 19),
                rgb(40, 60, 158),
                rgb(106, 92, 65)
            );
            background-size: 400% 400%;
            animation: grad 10s ease infinite;
        }

        @keyframes grad {
            0% { background-position: 0% 50%; }

            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 360px;
            margin: auto;
            padding: 25px;
            background-color: rgba(255,255,255,0.95);
            box-shadow: 0px 8px 32px black;
            border-radius: 12px;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus{
            border-color: teal;
        }

        button {
            margin-top: 25px;
            width: 100px;
            padding: 10px;
            background-color: teal;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 120px;
        }

        button:hover {
            background-color: rgb(24, 63, 63);
            transition: transform 4s ease;
            transform: scale(1.5);      
                   
         }

    </style>
</head>
<body>
    <div class="container">
        <h2>Employee Details</h2>
        <form>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter Name" required>

            <label for="phone number">phone number</label>
            <input type="number" id="number" placeholder="Enter mobile number" required>

            <label for="Designation">Designation</label>
            <input type="text" id="text" placeholder="Enter Designation" required>

            <label for="Salary">phone number</label>
            <input type="number" id="number" placeholder="Enter Salary" required>

            <label for="phone">phone number</label>
            <input type="number" id="number" placeholder="Enter mobile number" required>
            <div>
                <button type="submit">Register</button>
                </button>
            </div>

        </form>
    </div>
    
</body>
</html>
