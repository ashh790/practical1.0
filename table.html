<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            margin: 0;
            padding: 40px;
            background: linear-gradient(120deg , rgb(223, 189, 189), rgb(112, 79, 84) , rgb(212, 135, 212) , rgb(25, 103, 109) , rgb(182, 139, 182));
            background-size: 600% 600%;
            animation: grad 10s ease infinite;
        }

        @keyframes grad {
            0% , 100% {
                background-position: 0% 50%;
            }

            50%{
                background-position: 100%;
            }
        }

        .container{
            box-shadow: 0px 8px 32px rgb(194, 13, 13);
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            
        }

        table{
            width: 100%;
            text-align: center;
            border-collapse: collapse;
            
        }

        td{
            padding: 30px;
        }

        tbody tr:nth-child(odd){
            background-color: rgb(132, 225, 225);
        }

       thead tr{
            padding: 20px;
        }

        td::before{
            content: '🌲';
        }

        table:hover{
            cursor: pointer;
        }

        tbody td:hover{
            color: rgb(37, 2, 2);
            background-color: rgb(9, 224, 45);
            font-size: x-large;
            transition: transform 4s ease;
            transform:  rotateX(360deg);
        }
    </style>
</head>
<body>
    
    <div class="container">
        <table>
            <thead>
                <tr >
                    <th>ID</th>
                    <th>NAME</th>
                    <th>SALARY</th>
                    <th>DESIGNATION</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Rahul</td>
                    <td>1200</td>
                    <td>Developer</td>
                </tr>
                 <tr>
                    <td>2</td>
                    <td>Ritesh</td>
                    <td>5000</td>
                    <td>Developer</td>
                </tr>
                 <tr>
                    <td>3</td>
                    <td>Ashraf</td>
                    <td>15000</td>
                    <td>Developer</td>
                </tr>
                 <tr>
                    <td>4</td>
                    <td>Laksh</td>
                    <td>20000</td>
                    <td>Developer</td>
                </tr>
                 <tr>
                    <td>5</td>
                    <td>Baigan</td>
                    <td>120000</td>
                    <td>Developer</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
